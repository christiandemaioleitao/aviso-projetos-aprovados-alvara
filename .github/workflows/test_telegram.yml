name: Teste Telegram

on:
  workflow_dispatch:

jobs:
  test:
    name: Enviar mensagem de teste ao Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar requests
        run: pip install requests

      - name: Enviar mensagem de teste
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import sys
          import requests
          from datetime import datetime, timezone

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("ERRO: secrets TELEGRAM_BOT_TOKEN e/ou TELEGRAM_CHAT_ID ausentes.")
              sys.exit(1)

          agora = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          msg = (
              f"🧪 *Teste do AlvaráFácil Monitor*\n"
              f"────────────────────────\n"
              f"Se você está vendo isto no Telegram, os secrets estão configurados corretamente\\.\n\n"
              f"⏰ Disparado em: `{agora}`\n"
              f"🤖 Bot token: `…{token[-6:]}`\n"
              f"💬 Chat ID: `{chat_id}`\n\n"
              f"Pronto para o monitor diário\\!"
          )
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          r = requests.post(url, json={
              "chat_id": chat_id,
              "text": msg,
              "parse_mode": "MarkdownV2",
              "disable_web_page_preview": True,
          }, timeout=15)

          print(f"HTTP {r.status_code}")
          print(r.text)
          if not r.ok:
              sys.exit(1)
          print("OK — mensagem entregue.")
          PY
